<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkerChat | E2EE</title>
    <script src="https://unpkg.com/openpgp@6.2.0/dist/openpgp.min.js"></script>
    <script src="https://unpkg.com/marked@11.0.0/marked.min.js"></script>
    <script src="https://unpkg.com/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="container">
        <aside class="panel manage-area" id="manageArea">
            <div class="header">
                <h2>在线用户</h2>
                <div id="connectionStatus" class="connection-status status-disconnected">未连接</div>
            </div>
            
            <div class="user-list" id="userList">
                <div class="loading-text">等待连接...</div>
            </div>

            <div class="tab-container">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="keyManagement">密钥</button>
                    <button class="tab-btn" data-tab="roomSettings">设置</button>
                </div>

                <div class="tab-content active" id="keyManagement">
                    <div class="key-management">
                        <div class="key-info">
                            <span>密钥ID:</span>
                            <code id="keyId">未注册</code>
                        </div>
                        <div class="key-grid">
                            <button id="importPublicKey">导入公钥</button>
                            <button id="importPrivateKey">导入私钥</button>
                            <button id="copyPublicKey">复制公钥</button>
                            <button id="generateKeys" class="primary-btn">生成密钥</button>
                        </div>
                        <div class="debug-info" id="debugInfo"></div>
                    </div>
                </div>

                <div class="tab-content" id="roomSettings">
                    <div class="admin-management" id="adminPanel">
                         </div>
                </div>
            </div>
        </aside>

        <main class="panel chat-area">
            <header class="header">
                <button id="menuToggle" class="menu-toggle">
                    <span></span><span></span><span></span>
                </button>
                <div class="room-info">
                    <h2 id="roomName">E2EE Chat Room</h2>
                    <span class="room-url" id="roomUrl"></span>
                </div>
            </header>

            <section class="messages" id="messages"></section>

            <footer class="input-area">
                <textarea id="messageInput" placeholder="输入消息..." rows="1" disabled></textarea>
                <button id="sendButton" class="send-btn" disabled title="发送">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </footer>
        </main>
    </div>

    <div class="notification" id="notification"></div>

    <script src="js/markdown-config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/heartbeat.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/users.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/init.js"></script>

    <script>
        const menuBtn = document.getElementById('menuToggle');
        const sidebar = document.getElementById('manageArea');
        const overlay = document.getElementById('sidebarOverlay');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }

        menuBtn.onclick = toggleMenu;
        overlay.onclick = toggleMenu;

        // 自动调整输入框高度
        const tx = document.getElementById('messageInput');
        tx.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        }, false);
    </script>
</body>
</html>
